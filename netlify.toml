[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_GEMINI_API_KEY"

[[edge_functions]]
  path = "/api/generate-itinerary"
  function = "generate-itinerary"

[[edge_functions]]
  path = "/api/search-images"
  function = "search-images"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
